<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Development Quiz</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <div class="quiz-box">

        <h2 class="text-center mb-3">Web Development Quiz</h2>
<div id="quizSection">

    <div class="progress mb-3">
        <div id="progressBar" class="progress-bar" style="width: 0%"></div>
    </div>

    <div class="quiz-layout">

        <div class="question-area">
            <p id="questionNumber" class="fw-bold"></p>
            <h4 id="questionText" class="mb-4"></h4>

            <div id="optionsBox"></div>

            <div class="d-flex justify-content-between mt-4">
                <button class="btn btn-secondary" onclick="previousQuestion()">Previous</button>
                <button id="nextBtn" class="btn btn-primary" onclick="nextQuestion()">Next</button>
                <button id="submitBtn" class="btn btn-success" onclick="submitQuiz()">Submit</button>
            </div>
        </div>

        <div class="palette">
            <h5>Question Palette</h5>
            <p><span class="badge bg-success">Green</span> Answered</p>
            <p><span class="badge bg-danger">Red</span> Not Answered</p>
            <div id="paletteBox"></div>
        </div>

    </div>
</div>
        <div id="resultSection" style="display: none;"></div>

    </div>
</div>

<script src="script.js"></script>
</body>
</html>
